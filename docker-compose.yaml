version: '3.8'

services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      WPP_BRIDGE_URL: http://bridge:3000
    networks:
      - mensageria-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          memory: 256M

  # Laravel Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - redis
      - db
    environment:
      WPP_BRIDGE_URL: http://bridge:3000
    # command: passed as args to entrypoint.sh wrapper
    command: [ "php", "artisan", "queue:work", "--tries=3", "--memory=128", "--max-jobs=200" ]
    networks:
      - mensageria-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

  # Laravel Scheduler (Heartbeat)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - redis
      - db
    # Rodar o scheduler em loop (a cada 60s)
    command: ["sh", "-c", "while [ true ]; do php artisan schedule:run --no-interaction & sleep 60; done"]
    networks:
      - mensageria-net
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M

  # Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: mensageria
      MYSQL_ROOT_PASSWORD: supersenha
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_USER: app_user
      MYSQL_PASSWORD: supersenha
    # Prevent connection storms from overwhelming the VPS
    command: >-
      --max_connections=100 --innodb_buffer_pool_size=128M --table_open_cache=200
    volumes:
      - db-data-v2:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mensageria-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

  # WhatsApp Bridge (Node.js)
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: always
    stop_grace_period: 10s # give Node.js time to flush before SIGKILL
    volumes:
      - ./bridge/tokens:/app/tokens
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      WEBHOOK_URL: http://app/api/v1/webhook
      INTERNAL_KEY: 7caeb868-3d08-4761-b126-4f601cd05f7a
      HEAP_LIMIT_MB: '3072'
      QUEUE_MAX_SIZE: '10000'
      RATE_LIMIT_MAX: '20'
      AXIOS_TIMEOUT_MS: '30000'
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - mensageria-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          memory: 256M

  # Redis for Queue and Bridge communication
  redis:
    image: redis:alpine
    # maxmemory: hard cap to prevent unbounded growth
    # allkeys-lru: evict least-recently-used keys when full (safe for queue workloads)
    command: >-
      redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - mensageria-net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M

networks:
  mensageria-net:
    driver: bridge

volumes:
  storage-data:
  db-data-v2:
  redis-data:
