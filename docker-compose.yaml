version: '3.8'

services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - db
      - redis

  # Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: mensageria
      MYSQL_ROOT_PASSWORD: supersenha
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_USER: app_user
      MYSQL_PASSWORD: supersenha
    volumes:
      - db-data-v2:/var/lib/mysql
    ports:
      - "3307:3306"

  # PhpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
    ports:
      - "8085:80"

  # WhatsApp Bridge (Node.js)
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./bridge/tokens:/app/tokens
    depends_on:
      - redis

  # Redis for Queue and Bridge communication
  redis:
    image: redis:alpine
    restart: always

volumes:
  storage-data:
  db-data-v2:
