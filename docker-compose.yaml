version: '3.8'

services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # Laravel Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - redis
      - db
    entrypoint: ["php", "artisan", "queue:work", "--tries=3"]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: mensageria
      MYSQL_ROOT_PASSWORD: supersenha
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_USER: app_user
      MYSQL_PASSWORD: supersenha
    volumes:
      - db-data-v2:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306" # Somente local/SSH
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # PhpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
    ports:
      - "127.0.0.1:8085:80" # Somente local/SSH
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # WhatsApp Bridge (Node.js)
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./bridge/tokens:/app/tokens
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

  # Redis for Queue and Bridge communication
  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M

volumes:
  storage-data:
  db-data-v2:
  redis-data:
