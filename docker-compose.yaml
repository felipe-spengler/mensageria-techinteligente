version: '3.8'

services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mensageria-app
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    networks:
      - mensageria-network
    depends_on:
      - redis

  # WhatsApp Bridge (Node.js)
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    image: mensageria-bridge
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - mensageria-network
    depends_on:
      - redis

  # Redis for Queue and Bridge communication
  redis:
    image: redis:alpine
    restart: always
    networks:
      - mensageria-network

networks:
  mensageria-network:
    driver: bridge
