version: '3.8'

services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - redis

  # WhatsApp Bridge (Node.js)
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - redis

  # Redis for Queue and Bridge communication
  redis:
    image: redis:alpine
    restart: always
