version: '3.8'

services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - db
      - redis
    environment:
      WPP_BRIDGE_URL: http://bridge:3000
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M

  # Laravel Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - storage-data:/var/www/html/storage
    depends_on:
      - redis
      - db
    environment:
      WPP_BRIDGE_URL: http://bridge:3000
    # command: passed as args to entrypoint.sh wrapper
    command: ["php", "artisan", "queue:work", "--tries=3", "--memory=128", "--max-jobs=200"]
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M

  # Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: mensageria
      MYSQL_ROOT_PASSWORD: supersenha
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_USER: app_user
      MYSQL_PASSWORD: supersenha
    # Prevent connection storms from overwhelming the VPS
    command: >-
      --max_connections=100 --innodb_buffer_pool_size=128M --table_open_cache=200
    volumes:
      - db-data-v2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M

  # PhpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    environment:
      PMA_HOST: db
    ports:
      - "127.0.0.1:8085:80" # Somente local/SSH
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 32M

  # WhatsApp Bridge (Node.js)
  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    restart: always
    stop_grace_period: 10s # give Node.js time to flush before SIGKILL
    volumes:
      - ./bridge/tokens:/app/tokens
    depends_on:
      - redis
    environment:
      HEAP_LIMIT_MB: '768'         # lowered to fit in 4GB VPS
      QUEUE_MAX_SIZE: '10000'      # increased queue depth
      RATE_LIMIT_MAX: '20'         # relaxed for pro use
      AXIOS_TIMEOUT_MS: '30000'    # 30 s timeout for Laravel webhook calls
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M

  # Redis for Queue and Bridge communication
  redis:
    image: redis:alpine
    # maxmemory: hard cap to prevent unbounded growth
    # allkeys-lru: evict least-recently-used keys when full (safe for queue workloads)
    command: >-
      redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 128M
        reservations:
          memory: 32M

volumes:
  storage-data:
  db-data-v2:
  redis-data:
